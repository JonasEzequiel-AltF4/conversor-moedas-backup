<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
</head>
<body>
    <h1>Conversor de Moedas (BRL para USD)</h1>
    <p>Versão 0.8 - Apenas conversão de Real para Dólar </p>
    
    <div>
        <label for="brlInput">Valor em Real (R$):</label>
        <input type="number" id="brlInput" placeholder="Ex: 100.00">
    </div>
    <br>
    <button id="convertBtn">Converter para Dólar</button>
    
    <h3 id="result"></h3>

    <footer>
        <small>*Cotação fixa utilizada para testes: $1.00 USD = R$ 5.00</small>
    </footer>

    <hr>

<h2>Conversor de Moedas (BRL para EUR)</h2>
<p>Conversão de Real para Euro</p>

<div>
    <label for="eurInput">Valor em Real (R$):</label>
    <input type="number" id="eurInput" placeholder="Ex: 100.00">
</div>

<br>

<button id="convertEuroBtn">Converter para Euro</button>

<h3 id="resultEuro"></h3>

    <script src="CoApp.js"></script>
</body>
</html>
